name: CI

# Native, per-OS matrix — each runner builds and tests its OWN target; there is no
# cross-compilation step (CLAUDE.md "Platform targets — native, no cross-compilation").
# The pinned hledger 1.52 + Rust toolchain + git come from the nix flake, so the
# adapter/golden/e2e contract is identical on every runner.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: gate · ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - name: Linux x86_64
            runner: ubuntu-26.04
            target: x86_64-unknown-linux-gnu
          - name: Linux arm64
            runner: ubuntu-26.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix (flakes)
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.runner }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: cargo-${{ matrix.runner }}-

      # One `nix develop` shell pins hledger 1.52 + the toolchain. Each step is the
      # native target for THIS runner — no `--target`, no cross toolchain.
      - name: Quality gate (native ${{ matrix.target }})
        run: |
          nix develop --command bash -euo pipefail -c '
            echo "::group::versions"
            rustc -vV
            hledger --version            # must report 1.52.x (the pinned contract)
            echo "::endgroup::"

            cargo fmt --check
            cargo clippy --all-targets --all-features -- -D warnings
            # nextest compiles + links the bin natively (the stdio integration test runs it
            # via CARGO_BIN_EXE), so this single debug compile already proves it builds on this
            # OS. Tests run in debug deliberately (overflow panics surface bugs a release build
            # would silently wrap). Optimized/release artifacts + the container image are built
            # in M6 packaging, not on every commit — avoids a second full compile per leg.
            cargo nextest run --all-features   # unit + stdio integration + real-hledger e2e
          '

  coverage:
    name: coverage (≥85% lines)
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix (flakes)
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: coverage-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: coverage-

      # Hard gate from M1 (the milestones' coverage ramp): the adapter parser + formatters
      # are pure and must stay near-fully covered. Mirrors `mise run cov`.
      - name: Coverage (fail under 85% lines)
        run: |
          nix develop --command bash -euo pipefail -c '
            cargo llvm-cov --all-features --workspace --fail-under-lines 85
          '

  # The M3 formal gate: model-check proofs/tla/Ledger.tla (all safety invariants over all
  # interleavings within the cfg bounds) plus the spec-mutation sanity checks. Runs on one
  # leg only — the spec is platform-independent. The task self-provisions tla-checker via
  # `cargo install` (cached below, keyed on the version pinned in the task).
  tla:
    name: tla (model check + spec mutations)
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up mise (task runner)
        uses: jdx/mise-action@v2

      - name: Cache the tla-checker build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target/tla-tools
          key: tla-${{ hashFiles('mise.toml') }}
          restore-keys: tla-

      - name: Model check + spec-mutation sanity checks
        run: mise run tla

  # Diff-scoped mutation testing on PRs: mutate only lines changed vs the merge base and fail
  # on a survivor (a test gap). Fast enough to block on; the full `mise run mutants` sweep is
  # periodic/on-demand, not in CI. hledger isn't installed here — the e2e/smoke tests skip
  # gracefully, and the in-scope parser/amount logic is pure (no hledger needed).
  mutation:
    name: mutation (diff)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the merge base with main is reachable

      # A PR is checked out at a detached merge ref with no local `main` branch, so
      # `mutants-diff` resolves the base as `origin/main`. Ensure that remote-tracking ref
      # exists (fetch-depth:0 fetches it, but fetch it explicitly to be robust to PR merge refs).
      - name: Ensure origin/main is available for the diff base
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Set up mise (provisions cargo-mutants from [tools])
        uses: jdx/mise-action@v2

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: mutants-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: mutants-

      - name: Mutation testing (changed lines only)
        run: mise run mutants-diff
