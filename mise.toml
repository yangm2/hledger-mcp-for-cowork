min_version = "2024.1.0"

# mise is the outer task entrypoint; it delegates to cargo. The toolchain and the
# pinned hledger 1.52 + git come from the nix dev shell — enter it first:
#   nix develop          (or `direnv`/a materialized env), then `mise run <task>`
# Inside that shell, every task below is plain cargo and runs fully sandboxed.

# Dev tools for the sandboxed (outside-nix) loop. The nix flake also provides
# these for `nix develop`; mise makes them available without entering the shell.
# (`mise install` provisions them; built from source via the cargo backend.)
[tools]
# Pinned exact (reproducible, and avoids the crates.io "latest" API lookup, which
# the sandbox blocks). Bump deliberately.
"cargo:cargo-nextest" = "0.9.137"
"cargo:cargo-llvm-cov" = "0.8.7"
# Mutation testing — measures whether tests *catch* injected faults (assertion
# strength), complementing llvm-cov's line execution. Periodic / on-demand, not in
# the Stop-hook gate (too slow). See `mutants` + `mutants-diff` tasks.
"cargo:cargo-mutants" = "27.0.0"
# NOTE: tla-checker (the M3 model checker) is deliberately NOT a [tools] entry: mise's own
# HTTP client cannot reach crates.io under the Claude Code sandbox (TLS OSStatus -26276),
# and a single failing [tools] entry hard-fails every sandboxed `mise exec`. The `tla` task
# self-provisions it via `cargo install` (cargo's fetch works sandboxed) into target/.

[env]
# Per-clone env file holding the absolute path to the pinned hledger binary.
# Written once by `mise run init-env`; missing on a fresh clone is tolerated.
# Once present, tasks (and the e2e test) find hledger without re-entering nix.
_.file = { path = ".env.local", optional = true }
# scripts/bin/swift is a thin wrapper that injects --disable-sandbox into
# `swift build`, preventing apple-log's build script from calling sandbox-exec
# (which the Claude Code sandbox blocks). Prepended so it shadows the real swift.
_.path = ["scripts/bin"]

[tasks.init-env]
description = "One-time per-clone setup: write .env.local pointing at the pinned hledger binary"
quiet = true
run = '''
#!/usr/bin/env bash
set -euo pipefail
envfile=".env.local"

# Resolve the pinned hledger: the active nix dev shell first (exact pin, no extra
# nix call), then the flake via nix, then any hledger on PATH.
if [ -n "${HLEDGER_EXECUTABLE_PATH:-}" ]; then
  hl="$HLEDGER_EXECUTABLE_PATH"
elif command -v nix >/dev/null 2>&1 && [ -f flake.nix ]; then
  hl="$(nix develop --command sh -c 'printf "%s\n" "$HLEDGER_EXECUTABLE_PATH"' 2>/dev/null \
        | grep -E '^/.+/bin/hledger$' | tail -1)"
elif command -v hledger >/dev/null 2>&1; then
  hl="$(command -v hledger)"
else
  hl=""
fi

if [ -z "${hl:-}" ] || [ ! -x "$hl" ]; then
  echo "init-env: could not resolve an hledger binary." >&2
  echo "  Enter the dev shell ('nix develop') or install hledger 1.52, then re-run." >&2
  exit 1
fi

printf 'HLEDGER_EXECUTABLE_PATH=%s\n' "$hl" > "$envfile"
echo "init-env: wrote $envfile"
echo "  HLEDGER_EXECUTABLE_PATH=$hl"
"$hl" --version
'''

[tasks.init-settings-local]
description = "One-time per-clone setup: reconstitute machine-local sandbox-allowlist paths in .claude/settings.local.json (enables minimal-prompt sandboxed work). Gitignored; idempotent."
quiet = true
run = '''
#!/usr/bin/env bash
set -euo pipefail
# These are PII (absolute $HOME paths) so they are NOT committed — settings.local.json
# is gitignored. Reconstituted here per machine. Takes effect on the next Claude session.
python3 - "$HOME" <<'PY'
import json, os, pathlib, sys
home = sys.argv[1]
p = pathlib.Path(".claude/settings.local.json")
data = json.loads(p.read_text()) if p.exists() else {}
dirs = [
    "/private/tmp/test-data",                        # project scratch
    "/var/folders",                                  # macOS $TMPDIR root
    f"{home}/.cargo/registry",                       # cargo dep cache (fetch new crates)
    f"{home}/.rustup",                               # rustup toolchain store
    f"{home}/.local/state/mise",                     # mise trust/tracking state
    f"{home}/.local/share/mise",                     # mise-installed tools (nextest, llvm-cov)
    f"{home}/Library/Caches/org.swift.swiftpm",      # Swift PM package cache (apple-log build)
    f"{home}/Library/org.swift.swiftpm",             # Swift PM config + security DB (apple-log build)
]
# Foundation atomic writes (used by swift-driver for output-file-map.json) stage the
# temp file in the destination volume's item-replacement dir (<volume>/.TemporaryItems).
# On the root volume that's /var/folders (already covered); on any other volume the
# sandbox must allow it or apple-log's `swift build` fails mid-plan with EPERM.
vol = os.path.abspath(".")
dev = os.stat(vol).st_dev
while os.path.dirname(vol) != vol and os.stat(os.path.dirname(vol)).st_dev == dev:
    vol = os.path.dirname(vol)
if vol != "/":
    dirs.append(f"{vol}/.TemporaryItems")
ad = data.setdefault("permissions", {}).setdefault("additionalDirectories", [])
added = [d for d in dirs if d not in ad]
ad.extend(added)
p.parent.mkdir(parents=True, exist_ok=True)
p.write_text(json.dumps(data, indent=2) + "\n")
print(f"init-settings-local: {p} — added {len(added)} path(s), {len(ad)} total")
PY
'''

[tasks.init]
description = "One-time per-clone setup: init-env + init-settings-local"
depends = ["init-env", "init-settings-local"]

[tasks.init-journal]
description = "Initialize an empty hledger journal at the given path (creates the file + a git repo for the commit-as-epoch write path). Idempotent."
quiet = true
usage = '''
flag "-p --path <path>" help="Path to the journal file to create (required)"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

journal="${usage_path:-}"
[ -n "$journal" ] || { echo "init-journal: --path <path> is required" >&2; exit 1; }

# Make the path absolute so git init and hledger always agree on the location.
case "$journal" in
  /*) : ;;
  *)
    mkdir -p "$(dirname "$journal")"
    journal="$(cd "$(dirname "$journal")" && pwd)/$(basename "$journal")"
    ;;
esac

jdir="$(dirname "$journal")"
mkdir -p "$jdir"

# Create the journal file if it doesn't exist.
if [ ! -f "$journal" ]; then
  cat > "$journal" <<'EOF'
; hledger journal
; created by mise run init-journal
;
; Add account declarations here, then record transactions below.
EOF
  echo "init-journal: created $journal"
else
  echo "init-journal: journal already exists at $journal (skipping file creation)"
fi

# The write path commits on every validated write (git-as-epoch). The repo must exist.
if [ ! -d "$jdir/.git" ]; then
  git -C "$jdir" init -q
  git -C "$jdir" add "$(basename "$journal")"
  git -C "$jdir" -c user.name="hledger-mcp" -c user.email="hledger-mcp@localhost" \
      commit -q -m "init: empty journal"
  echo "init-journal: initialized git repo and committed initial journal"
else
  echo "init-journal: git repo already initialized at $jdir"
fi

echo ""
echo "Journal ready. Register it with:"
echo "  mise run install --journal $journal"
'''

[tasks.build]
description = "Compile (debug)"
run = "cargo build"

[tasks.fmt]
description = "Format the code"
run = "cargo fmt"

[tasks.lint]
description = "Clippy, zero-warnings bar"
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.test]
description = "Run all tests (unit + e2e smoke); nextest if available, else cargo test"
run = "if cargo nextest --version >/dev/null 2>&1; then cargo nextest run; else cargo test; fi"

[tasks.e2e]
description = "Run only the e2e smoke test against real hledger"
run = "cargo test --test smoke -- --nocapture"

[tasks.cov]
description = "Coverage (strict bar: >=85% lines)"
run = "cargo llvm-cov --all-features --workspace --fail-under-lines 85"

[tasks.golden]
description = "Regenerate the hledger -O json golden fixtures from the pinned binary + synthetic sample journal. Run deliberately after an hledger version bump; commit the diff. Scrubs the absolute -f path so fixtures stay machine-independent and PII-free."
run = '''
#!/usr/bin/env bash
set -euo pipefail
hl="${HLEDGER_EXECUTABLE_PATH:-hledger}"
dir="tests/fixtures"
[ -f "$dir/sample.journal" ] || { echo "golden: missing $dir/sample.journal" >&2; exit 1; }
# Run from the fixtures dir with a RELATIVE -f so hledger's tsourcepos paths are relative;
# then scrub the absolute form hledger expands to (no $HOME / machine path leaks — public repo).
abs="$(cd "$dir" && pwd)/sample.journal"
( cd "$dir"
  "$hl" balance assets:checking -f sample.journal -O json > balance_single.json
  "$hl" balance               -f sample.journal -O json > balance_all.json
  "$hl" print                 -f sample.journal -O json > print_basic.json
  "$hl" register expenses     -f sample.journal -O json > register_basic.json
)
python3 - "$abs" "$dir" <<'PY'
import pathlib, sys
abspath, dir = sys.argv[1], pathlib.Path(sys.argv[2])
for f in ("balance_single.json","balance_all.json","print_basic.json","register_basic.json"):
    p = dir / f
    p.write_text(p.read_text().replace(abspath, "sample.journal"))
PY
echo "golden: regenerated fixtures in $dir (scrubbed). Review the diff before committing."
'''

[tasks.mutants]
description = "Mutation testing on the pure, high-stakes modules (assertion strength; periodic/on-demand, not in the Stop-hook gate). Surviving mutants = test gaps. Pass file paths to scope to just those (default: the parser + amount modules)."
# Scope to pure correctness-critical code where a surviving mutant is a real hole;
# the subprocess/transport/logging glue is excluded (mutants there mostly time out).
# Default in-scope (M1): the -O json parser + the exact-decimal amount. Extend the default as
# modules land (M2 formatter, M3 CAS, M4 domain); override per-run with file args, e.g.
# `mise run mutants src/hledger/json.rs` to mutate only the file you just touched.
usage = '''
arg "<files>" var=#true help="Source files to mutate (default: src/hledger/json.rs + src/hledger/amount.rs)"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail
# Default set when no files are given. Word-splitting on the space-separated `usage_files`
# (or the default) is intentional — each entry becomes a `-f <file>` argument.
files="${usage_files:-src/hledger/json.rs src/hledger/amount.rs src/write/format.rs src/write/validate.rs src/epoch.rs src/flags.rs}"
fargs=()
for f in $files; do fargs+=( -f "$f" ); done
cargo mutants --no-shuffle "${fargs[@]}" -- --all-features
'''

[tasks.mutants-diff]
description = "Fast mutation testing: only mutate lines changed vs the merge base with main (suitable for PR CI gating)."
# Materialize the diff to a file first — `--in-diff` wants a path, and process
# substitution isn't portable to the sh/dash used by CI.
run = '''
#!/usr/bin/env bash
set -euo pipefail
# Resolve a base ref that exists both locally and in a CI PR checkout. A PR checkout has no
# local `main` branch (detached HEAD), so prefer the remote-tracking `origin/main`; fall back
# to a local `main`, or an explicit override. Without this, `git diff --merge-base main` dies
# with "unknown revision 'main'" in CI.
base="${MUTANTS_DIFF_BASE:-}"
if [ -z "$base" ]; then
  for ref in origin/main main; do
    if git rev-parse --verify --quiet "$ref^{commit}" >/dev/null; then base="$ref"; break; fi
  done
fi
[ -n "$base" ] || { echo "mutants-diff: no base ref found (set MUTANTS_DIFF_BASE)" >&2; exit 1; }
diff="$(mktemp)"
trap 'rm -f "$diff"' EXIT
git diff --merge-base "$base" > "$diff"
cargo mutants --in-diff "$diff" -- --all-features
'''

[tasks.tla]
description = "Model-check the M3 concurrency spec (proofs/tla/Ledger.tla) with tla-checker: all safety invariants over all interleavings within the Ledger.cfg bounds, then the spec-mutation sanity checks (each deliberately broken spec variant must be caught — proves the gate is load-bearing and validates the checker). Self-provisions tla-checker via cargo on first run. The spec is TLC-compatible; tla2tools.jar is a drop-in fallback (and the only way to check the Progress liveness property — see Ledger_live.cfg)."
run = '''
#!/usr/bin/env bash
set -euo pipefail
# Resolve the checker: $TLA_BIN > `tla` on PATH > self-provision via cargo into target/
# (a [tools] entry would hard-fail sandboxed `mise exec`; cargo's fetch works sandboxed).
tla_version="0.6.3"
tla="${TLA_BIN:-}"
if [ -z "$tla" ]; then
  if command -v tla >/dev/null 2>&1; then
    tla="tla"
  else
    root="target/tla-tools"
    if [ ! -x "$root/bin/tla" ]; then
      echo "tla: installing tla-checker $tla_version via cargo (one-time)"
      cargo install tla-checker --version "$tla_version" --locked --root "$root"
    fi
    tla="$root/bin/tla"
  fi
fi
echo "== model-checking proofs/tla/Ledger.tla =="
"$tla" proofs/tla/Ledger.tla --config proofs/tla/Ledger.cfg
echo
echo "== spec-mutation sanity checks =="
TLA_BIN="$tla" python3 proofs/tla/mutate.py
'''

[tasks.check]
description = "Full quality gate: fmt + clippy + tests (mirrors the Stop hook). Linux portability is covered by the native per-OS CI matrix, not a local cross-lint."
run = [
  "cargo fmt --check",
  "cargo clippy --all-targets --all-features -- -D warnings",
  "if cargo nextest --version >/dev/null 2>&1; then cargo nextest run; else cargo test; fi",
]

[tasks.run]
description = "Run the MCP server (stdio transport)"
run = "cargo run"

[tasks.debug-log]
description = "Stream this server's macOS unified-log output (subsystem-filtered, down to debug) to a file under .debug/ for diagnosis, while also echoing it live. Requires sudo (privileged log streaming). macOS only. Reproduce the issue, then Ctrl-C; the .ndjson file is what Claude reads."
run = '''
#!/usr/bin/env bash
set -euo pipefail
[ "$(uname -s)" = "Darwin" ] || { echo "debug-log: macOS only (Linux logs go to the container runtime's stdout/stderr)."; exit 1; }

subsystem="io.github.yangm2.hledger-mcp-for-cowork"
mkdir -p .debug
out=".debug/mcp-log-$(date +%Y%m%d-%H%M%S).ndjson"

echo "Streaming os_log subsystem=$subsystem (level: debug) → $out"
echo "Our log lines are emitted Public (no <private> redaction)."
echo "Make sure the server runs at debug/trace verbosity (\`mise run install -v\` or -vv,"
echo "or RUST_LOG=debug), reproduce the issue,"
echo "then press Ctrl-C. Hand $out to Claude."
echo

# `log stream` is live (info/debug aren't persisted, so streaming is the way to see them).
# --level debug includes debug + info + default + higher. ndjson is machine-readable.
# sudo: privileged capture (matches the predecessor's privileged redirect); tee so you
# see it live while it's saved. Ctrl-C stops the stream and flushes the file.
sudo log stream \
  --predicate "subsystem == \"$subsystem\"" \
  --level debug \
  --style ndjson \
  | tee "$out"
'''

[tasks.install]
description = "Register this MCP server in Claude Desktop config (also exposes it to Claude Cowork via Desktop's SDK bridge). Builds a debug binary, writes an absolute-path stdio entry pinning hledger + the journal. Idempotent; restart Claude to load it. Pass -v/-vv for debug/trace logging, --journal <path> for the ledger to serve."
quiet = true
depends = ["build"]
# `usage` spec parses task flags (mise surfaces them as `usage_*` env vars). `-v` (repeatable)
# sets how many `-v`s are baked into the registered server's args (debug/trace verbosity).
# `--journal` sets the ledger the registered server serves (baked into the entry as LEDGER_FILE,
# which the binary reads); falls back to the LEDGER_FILE in the environment when omitted.
usage = '''
flag "-v --verbose" count=#true help="Register the server with raised log verbosity (-v = debug, -vv = trace)"
flag "-j --journal <path>" help="Journal file the registered server serves (sets LEDGER_FILE; without it, read tools error until a journal is configured)"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail
# The binary is produced by the `build` dependency (don't re-`cargo build` here — that would
# compile twice). Resolve its absolute path for the registered entry.
bin="$PWD/target/debug/hledger-mcp-for-cowork"
[ -x "$bin" ] || { echo "install: built binary not found at $bin (run \`mise run build\`)" >&2; exit 1; }

# Verbosity: `usage_verbose` is the count of `-v` (unset when none) — turn it into that
# many `-v` args for the registered server.
verbosity="${usage_verbose:-0}"

# Journal: the --journal flag wins, else the LEDGER_FILE already in the environment. Baked
# into the registered entry as LEDGER_FILE (the binary reads it); empty → no journal pinned
# (the server runs but read tools error until one is configured).
journal="${usage_journal:-${LEDGER_FILE:-}}"

# Desktop launches the server with an unspecified CWD, so a relative journal would resolve
# wrong. Make it absolute (without requiring the file to exist yet — hledger needs the file,
# but its containing directory must exist so we can resolve the path).
if [ -n "$journal" ]; then
  case "$journal" in
    /*) : ;;  # already absolute
    *)
      jdir="$(cd "$(dirname "$journal")" 2>/dev/null && pwd)" \
        || { echo "install: --journal directory does not exist: $(dirname "$journal")" >&2; exit 1; }
      journal="$jdir/$(basename "$journal")"
      ;;
  esac
fi

# Claude Desktop config path. Cowork bridges these stdio servers via the SDK layer,
# so registering here makes the server available to both Desktop and Cowork.
case "$(uname -s)" in
  Darwin) cfg="$HOME/Library/Application Support/Claude/claude_desktop_config.json" ;;
  Linux)  cfg="$HOME/.config/Claude/claude_desktop_config.json" ;;
  *) echo "install: unsupported OS $(uname -s)" >&2; exit 1 ;;
esac

# Idempotent JSON merge (don't clobber other mcpServers). The config lives under
# $HOME outside the repo, so the absolute paths here are not repo PII.
python3 - "$cfg" "$bin" "${HLEDGER_EXECUTABLE_PATH:-}" "$verbosity" "$journal" <<'PY'
import json, pathlib, sys
cfg, binpath, hl, verbosity, journal = sys.argv[1:6]
verbosity = int(verbosity)
p = pathlib.Path(cfg)
data = json.loads(p.read_text()) if p.exists() else {}
args = ["-v"] * verbosity   # 0 → [], 1 → ["-v"], 2 → ["-v","-v"] (clap counts them)
entry = {"command": binpath, "args": args}
# Bake the runtime env the launched server needs: which hledger, and which ledger.
env = {}
if hl:
    env["HLEDGER_EXECUTABLE_PATH"] = hl
if journal:
    env["LEDGER_FILE"] = journal
if env:
    entry["env"] = env
data.setdefault("mcpServers", {})["hledger-mcp"] = entry
p.parent.mkdir(parents=True, exist_ok=True)
p.write_text(json.dumps(data, indent=2) + "\n")
level = {0: "info", 1: "debug"}.get(verbosity, "trace")
print(f"install: registered 'hledger-mcp' -> {binpath} (log level: {level})")
print(f"  config:  {cfg}")
print(f"  hledger: {hl or '(PATH fallback — HLEDGER_EXECUTABLE_PATH not set at install)'}")
if journal:
    print(f"  journal: {journal}")
else:
    print("  journal: (none — read tools will error; re-run with --journal <path> or set LEDGER_FILE)")
print("  restart Claude Desktop / Cowork to load it.")
PY
'''

[tasks.uninstall]
description = "Remove this MCP server's entry from Claude Desktop config (Desktop + Cowork). Idempotent."
quiet = true
run = '''
#!/usr/bin/env bash
set -euo pipefail
case "$(uname -s)" in
  Darwin) cfg="$HOME/Library/Application Support/Claude/claude_desktop_config.json" ;;
  Linux)  cfg="$HOME/.config/Claude/claude_desktop_config.json" ;;
  *) echo "uninstall: unsupported OS $(uname -s)" >&2; exit 1 ;;
esac
[ -f "$cfg" ] || { echo "uninstall: no config at $cfg (nothing to do)"; exit 0; }
python3 - "$cfg" <<'PY'
import json, pathlib, sys
p = pathlib.Path(sys.argv[1])
data = json.loads(p.read_text())
if data.get("mcpServers", {}).pop("hledger-mcp", None) is not None:
    p.write_text(json.dumps(data, indent=2) + "\n")
    print("uninstall: removed 'hledger-mcp'; restart Claude to apply.")
else:
    print("uninstall: 'hledger-mcp' not present (nothing to do)")
PY
'''

[tasks.clean]
description = "Remove cargo build artifacts (target/, incl. coverage)"
run = "cargo clean"

[tasks.clean-more]
description = "Deep clean: cargo artifacts + generated dev-env files (.env.local, nix result, .devenv.sh, .direnv)"
depends = ["clean"]
run = "rm -rf .env.local result result-* .devenv.sh .direnv"

