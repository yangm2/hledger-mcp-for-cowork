min_version = "2024.1.0"

# mise is the outer task entrypoint; it delegates to cargo. The toolchain and the
# pinned hledger 1.52 + git come from the nix dev shell — enter it first:
#   nix develop          (or `direnv`/a materialized env), then `mise run <task>`
# Inside that shell, every task below is plain cargo and runs fully sandboxed.

# Dev tools for the sandboxed (outside-nix) loop. The nix flake also provides
# these for `nix develop`; mise makes them available without entering the shell.
# (`mise install` provisions them; built from source via the cargo backend.)
[tools]
# Pinned exact (reproducible, and avoids the crates.io "latest" API lookup, which
# the sandbox blocks). Bump deliberately.
"cargo:cargo-nextest" = "0.9.137"
"cargo:cargo-llvm-cov" = "0.8.7"
# Mutation testing — measures whether tests *catch* injected faults (assertion
# strength), complementing llvm-cov's line execution. Periodic / on-demand, not in
# the Stop-hook gate (too slow). See `mutants` + `mutants-diff` tasks.
"cargo:cargo-mutants" = "27.0.0"

[env]
# Per-clone env file holding the absolute path to the pinned hledger binary.
# Written once by `mise run init-env`; missing on a fresh clone is tolerated.
# Once present, tasks (and the e2e test) find hledger without re-entering nix.
_.file = { path = ".env.local", optional = true }

[tasks.init-env]
description = "One-time per-clone setup: write .env.local pointing at the pinned hledger binary"
quiet = true
run = '''
#!/usr/bin/env bash
set -euo pipefail
envfile=".env.local"

# Resolve the pinned hledger: the active nix dev shell first (exact pin, no extra
# nix call), then the flake via nix, then any hledger on PATH.
if [ -n "${HLEDGER_EXECUTABLE_PATH:-}" ]; then
  hl="$HLEDGER_EXECUTABLE_PATH"
elif command -v nix >/dev/null 2>&1 && [ -f flake.nix ]; then
  hl="$(nix develop --command sh -c 'printf "%s\n" "$HLEDGER_EXECUTABLE_PATH"' 2>/dev/null \
        | grep -E '^/.+/bin/hledger$' | tail -1)"
elif command -v hledger >/dev/null 2>&1; then
  hl="$(command -v hledger)"
else
  hl=""
fi

if [ -z "${hl:-}" ] || [ ! -x "$hl" ]; then
  echo "init-env: could not resolve an hledger binary." >&2
  echo "  Enter the dev shell ('nix develop') or install hledger 1.52, then re-run." >&2
  exit 1
fi

printf 'HLEDGER_EXECUTABLE_PATH=%s\n' "$hl" > "$envfile"
echo "init-env: wrote $envfile"
echo "  HLEDGER_EXECUTABLE_PATH=$hl"
"$hl" --version
'''

[tasks.init-settings-local]
description = "One-time per-clone setup: reconstitute machine-local sandbox-allowlist paths in .claude/settings.local.json (enables minimal-prompt sandboxed work). Gitignored; idempotent."
quiet = true
run = '''
#!/usr/bin/env bash
set -euo pipefail
# These are PII (absolute $HOME paths) so they are NOT committed — settings.local.json
# is gitignored. Reconstituted here per machine. Takes effect on the next Claude session.
python3 - "$HOME" <<'PY'
import json, pathlib, sys
home = sys.argv[1]
p = pathlib.Path(".claude/settings.local.json")
data = json.loads(p.read_text()) if p.exists() else {}
dirs = [
    "/private/tmp/test-data",          # project scratch
    "/var/folders",                    # macOS $TMPDIR root
    f"{home}/.cargo/registry",         # cargo dep cache (fetch new crates)
    f"{home}/.rustup",                 # rustup toolchain store
    f"{home}/.local/state/mise",       # mise trust/tracking state
    f"{home}/.local/share/mise",       # mise-installed tools (nextest, llvm-cov)
]
ad = data.setdefault("permissions", {}).setdefault("additionalDirectories", [])
added = [d for d in dirs if d not in ad]
ad.extend(added)
p.parent.mkdir(parents=True, exist_ok=True)
p.write_text(json.dumps(data, indent=2) + "\n")
print(f"init-settings-local: {p} — added {len(added)} path(s), {len(ad)} total")
PY
'''

[tasks.init]
description = "One-time per-clone setup: init-env + init-settings-local"
depends = ["init-env", "init-settings-local"]

[tasks.build]
description = "Compile (debug)"
run = "cargo build"

[tasks.fmt]
description = "Format the code"
run = "cargo fmt"

[tasks.lint]
description = "Clippy, zero-warnings bar"
run = "cargo clippy --all-targets --all-features -- -D warnings"

[tasks.test]
description = "Run all tests (unit + e2e smoke); nextest if available, else cargo test"
run = "if cargo nextest --version >/dev/null 2>&1; then cargo nextest run; else cargo test; fi"

[tasks.e2e]
description = "Run only the e2e smoke test against real hledger"
run = "cargo test --test smoke -- --nocapture"

[tasks.cov]
description = "Coverage (strict bar: >=85% lines)"
run = "cargo llvm-cov --all-features --workspace --fail-under-lines 85"

[tasks.mutants]
description = "Mutation testing on the pure, high-stakes modules (assertion strength; periodic/on-demand, not in the Stop-hook gate). Surviving mutants = test gaps."
# Scope to pure correctness-critical code where a surviving mutant is a real hole;
# the subprocess/transport/logging glue is excluded (mutants there mostly time out).
# Tighten --in-place/paths as modules land (M1 parser, M2 formatter, M3 CAS, M4 domain).
run = "cargo mutants --no-shuffle -- --all-features"

[tasks.mutants-diff]
description = "Fast mutation testing: only mutate lines changed vs the merge base (suitable for PR CI gating)."
# Materialize the diff to a file first — `--in-diff` wants a path, and process
# substitution isn't portable to the sh/dash used by CI.
run = '''
#!/usr/bin/env bash
set -euo pipefail
diff="$(mktemp)"
trap 'rm -f "$diff"' EXIT
git diff --merge-base main > "$diff"
cargo mutants --in-diff "$diff" -- --all-features
'''

[tasks.check-cross]
description = "Cross-target portability lint: clippy (zero-warnings) for the Linux gnu targets (x86_64 + aarch64) from the host dev box. Skips any target whose std is not installed (`rustup target add <triple>`). Lint/check only — does not link or run."
run = '''
#!/usr/bin/env bash
set -uo pipefail
# Both Linux deployment arches (containers ship native per-OS — no musl cross-build;
# see CLAUDE.md "Platform targets"). `aarch64` matches an Apple-Silicon dev box / ARM64
# container; `x86_64` matches an amd64 host.
targets="x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu"
installed="$(rustup target list --installed 2>/dev/null || true)"
fail=0
ran=0
for t in $targets; do
  if printf '%s\n' "$installed" | grep -qx "$t"; then
    echo ">>> clippy --target $t"
    cargo clippy --target "$t" --all-targets --all-features -- -D warnings || fail=1
    ran=1
  else
    echo "skip $t — std not installed (\`rustup target add $t\`)"
  fi
done
[ "$ran" -eq 0 ] && echo "check-cross: no Linux gnu targets installed; nothing cross-checked."
exit "$fail"
'''

[tasks.check]
description = "Full quality gate: fmt + clippy + tests + cross-target portability (mirrors the Stop hook)"
run = [
  "cargo fmt --check",
  "cargo clippy --all-targets --all-features -- -D warnings",
  "if cargo nextest --version >/dev/null 2>&1; then cargo nextest run; else cargo test; fi",
  "mise run check-cross",
]

[tasks.run]
description = "Run the MCP server (stdio transport)"
run = "cargo run"

[tasks.debug-log]
description = "Stream this server's macOS unified-log output (subsystem-filtered, down to debug) to a file under .debug/ for diagnosis, while also echoing it live. Requires sudo (privileged log streaming). macOS only. Reproduce the issue, then Ctrl-C; the .ndjson file is what Claude reads."
run = '''
#!/usr/bin/env bash
set -euo pipefail
[ "$(uname -s)" = "Darwin" ] || { echo "debug-log: macOS only (Linux logs go to the container runtime's stdout/stderr)."; exit 1; }

subsystem="io.github.yangm2.hledger-mcp-for-cowork"
mkdir -p .debug
out=".debug/mcp-log-$(date +%Y%m%d-%H%M%S).ndjson"

echo "Streaming os_log subsystem=$subsystem (level: debug) → $out"
echo "Our log lines are emitted Public (no <private> redaction)."
echo "Make sure the server runs at debug/trace verbosity (\`mise run install -v\` or -vv,"
echo "or RUST_LOG=debug), reproduce the issue,"
echo "then press Ctrl-C. Hand $out to Claude."
echo

# `log stream` is live (info/debug aren't persisted, so streaming is the way to see them).
# --level debug includes debug + info + default + higher. ndjson is machine-readable.
# sudo: privileged capture (matches the predecessor's privileged redirect); tee so you
# see it live while it's saved. Ctrl-C stops the stream and flushes the file.
sudo log stream \
  --predicate "subsystem == \"$subsystem\"" \
  --level debug \
  --style ndjson \
  | tee "$out"
'''

[tasks.install]
description = "Register this MCP server in Claude Desktop config (also exposes it to Claude Cowork via Desktop's SDK bridge). Builds a debug binary, writes an absolute-path stdio entry. Idempotent; restart Claude to load it. Pass -v/-vv to register with debug/trace logging."
quiet = true
depends = ["build"]
# `usage` spec parses task flags (mise surfaces them as `usage_*` env vars). The
# repeatable `-v` sets how many `-v`s are baked into the registered server's args, so
# Cowork/Desktop launches it at debug (-v) or trace (-vv) verbosity for diagnosis.
usage = '''
flag "-v --verbose" count=#true help="Register the server with raised log verbosity (-v = debug, -vv = trace)"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail
cargo build
bin="$PWD/target/debug/hledger-mcp-for-cowork"
[ -x "$bin" ] || { echo "install: built binary not found at $bin" >&2; exit 1; }

# Verbosity: `usage_verbose` is the count of `-v` (unset when none) — turn it into that
# many `-v` args for the registered server.
verbosity="${usage_verbose:-0}"

# Claude Desktop config path. Cowork bridges these stdio servers via the SDK layer,
# so registering here makes the server available to both Desktop and Cowork.
case "$(uname -s)" in
  Darwin) cfg="$HOME/Library/Application Support/Claude/claude_desktop_config.json" ;;
  Linux)  cfg="$HOME/.config/Claude/claude_desktop_config.json" ;;
  *) echo "install: unsupported OS $(uname -s)" >&2; exit 1 ;;
esac

# Idempotent JSON merge (don't clobber other mcpServers). The config lives under
# $HOME outside the repo, so the absolute paths here are not repo PII.
python3 - "$cfg" "$bin" "${HLEDGER_EXECUTABLE_PATH:-}" "$verbosity" <<'PY'
import json, pathlib, sys
cfg, binpath, hl, verbosity = sys.argv[1], sys.argv[2], sys.argv[3], int(sys.argv[4])
p = pathlib.Path(cfg)
data = json.loads(p.read_text()) if p.exists() else {}
args = ["-v"] * verbosity   # 0 → [], 1 → ["-v"], 2 → ["-v","-v"] (clap counts them)
entry = {"command": binpath, "args": args}
if hl:
    entry["env"] = {"HLEDGER_EXECUTABLE_PATH": hl}
data.setdefault("mcpServers", {})["hledger-mcp"] = entry
p.parent.mkdir(parents=True, exist_ok=True)
p.write_text(json.dumps(data, indent=2) + "\n")
level = {0: "info", 1: "debug"}.get(verbosity, "trace")
print(f"install: registered 'hledger-mcp' -> {binpath} (log level: {level})")
print(f"  config: {cfg}")
print("  restart Claude Desktop / Cowork to load it.")
PY
'''

[tasks.uninstall]
description = "Remove this MCP server's entry from Claude Desktop config (Desktop + Cowork). Idempotent."
quiet = true
run = '''
#!/usr/bin/env bash
set -euo pipefail
case "$(uname -s)" in
  Darwin) cfg="$HOME/Library/Application Support/Claude/claude_desktop_config.json" ;;
  Linux)  cfg="$HOME/.config/Claude/claude_desktop_config.json" ;;
  *) echo "uninstall: unsupported OS $(uname -s)" >&2; exit 1 ;;
esac
[ -f "$cfg" ] || { echo "uninstall: no config at $cfg (nothing to do)"; exit 0; }
python3 - "$cfg" <<'PY'
import json, pathlib, sys
p = pathlib.Path(sys.argv[1])
data = json.loads(p.read_text())
if data.get("mcpServers", {}).pop("hledger-mcp", None) is not None:
    p.write_text(json.dumps(data, indent=2) + "\n")
    print("uninstall: removed 'hledger-mcp'; restart Claude to apply.")
else:
    print("uninstall: 'hledger-mcp' not present (nothing to do)")
PY
'''

[tasks.clean]
description = "Remove cargo build artifacts (target/, incl. coverage)"
run = "cargo clean"

[tasks.clean-more]
description = "Deep clean: cargo artifacts + generated dev-env files (.env.local, nix result, .devenv.sh, .direnv)"
depends = ["clean"]
run = "rm -rf .env.local result result-* .devenv.sh .direnv"
