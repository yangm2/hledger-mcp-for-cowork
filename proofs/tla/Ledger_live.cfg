\* Liveness model config for Ledger.tla — for **TLC** (`tla2tools.jar`), not part of
\* the `mise run tla` gate: tla-checker 0.6.3 cannot yet verify the quantified weak
\* fairness LiveSpec uses (see the note in Ledger.tla). Progress: a stale connection
\* always reaches freshness (C-5 as a temporal property); operationally pinned by
\* tests/concurrency.rs.
CONSTANTS
  Connections = {"c1", "c2"}
  Accounts = {"a1", "a2"}
  Keys = {"k1", "k2", "k3"}
  MaxEpoch = 4

SPECIFICATION LiveSpec

PROPERTIES
  Progress

CHECK_DEADLOCK FALSE
