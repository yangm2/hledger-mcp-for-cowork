\* TLC-style model config for Ledger.tla (loaded by tla-checker and TLC alike).
\* Small finite bounds — enough to exercise every interleaving that matters:
\* 2 connections x 2 accounts x 3 idempotency keys, epoch capped at 4.
CONSTANTS
  Connections = {"c1", "c2"}
  Accounts = {"a1", "a2"}
  Keys = {"k1", "k2", "k3"}
  MaxEpoch = 4

INIT Init
NEXT Next

INVARIANTS
  EpochMonotonic
  NoLostDecision
  FullyInformedDecisions
  IdempotentPosts
  AppendOnly
  RefIntegrity
  HeadAlwaysValid

\* Bounded counters make terminal states inevitable (epoch = MaxEpoch with all
\* keys used); that is a model artifact, not a system deadlock.
CHECK_DEADLOCK FALSE
